# WakaTime Coding Stats
# Displays weekly coding metrics (languages, editors, OS, coding time)
# Requires WAKATIME_API_KEY secret from https://wakatime.com/settings/api-key
name: WakaTime Stats

on:
  schedule:
    - cron: "30 23 * * *" # Daily at 11:30 PM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOW_LINES_OF_CODE: "True"
          SHOW_PROFILE_VIEWS: "False"
          SHOW_SHORT_INFO: "False"
          SHOW_LOC_CHART: "False"
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_LANGUAGE: "True"
          SHOW_OS: "True"
          SHOW_EDITORS: "True"
          SHOW_PROJECTS: "True"
          SHOW_TIMEZONE: "True"
          SHOW_LANGUAGE_PER_REPO: "False"
          SHOW_UPDATED_DATE: "True"
          COMMIT_MESSAGE: "chore: update WakaTime stats"
